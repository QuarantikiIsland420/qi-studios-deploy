name: Daily Regularization Reading

on:
  schedule:
    # 6:00 AM Costa Rica time (UTC-6, no DST) = 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch: # manual trigger button in the Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Generate horoscopes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run generate

      - name: Commit horoscopes.json
        run: |
          git config user.name "regularization-bot"
          git config user.email "regularization-bot@users.noreply.github.com"
          git add horoscopes.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily reading: $(date -u +%Y-%m-%d)"
            git push
          fi
