<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Portal — QI Studios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=EB+Garamond:ital,wght@0,400;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0e1210;
  --bg-warm:   #111a16;
  --bg-card:   #141e19;
  --border:    #253028;
  --dim:       #526058;
  --muted:     #889890;
  --silver:    #b8c8be;
  --cream:     #F4EDE0;
  --gold:      #C8882A;
  --gold-soft: #d99838;
  --gold-pale: #e0aa50;
  --teal:      #3D7E7A;
  --teal-soft: #4a9490;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--silver);
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 18px;
  line-height: 1.7;
  overflow-x: hidden;
  min-height: 100vh;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 600 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.05'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.4;
  mix-blend-mode: overlay;
}

/* ─── LOGIN SCREEN ─────────────────────────────────────────────────────────── */

#login-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  z-index: 100;
  background: var(--bg);
}

.login-card {
  width: 100%;
  max-width: 440px;
  text-align: center;
}

.login-wordmark {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--cream);
  margin-bottom: 6px;
}

.login-wordmark em {
  font-style: italic;
  color: var(--gold);
}

.login-rule {
  width: 40px;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  margin: 18px auto;
}

.login-label {
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 9px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 48px;
  display: block;
}

.login-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(36px, 8vw, 52px);
  color: var(--cream);
  line-height: 1.1;
  margin-bottom: 10px;
}

.login-title em { font-style: italic; color: var(--gold-pale); }

.login-sub {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--dim);
  margin-bottom: 52px;
  line-height: 1.5;
}

.login-form { display: flex; flex-direction: column; gap: 14px; }

.login-input-wrap { position: relative; }

.login-input {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-bottom-color: rgba(200,136,42,0.35);
  color: var(--cream);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 16px;
  letter-spacing: 0.3em;
  text-align: center;
  text-transform: uppercase;
  padding: 18px 20px;
  outline: none;
  transition: border-color 0.25s, background 0.25s;
}

.login-input::placeholder {
  color: var(--dim);
  letter-spacing: 0.2em;
  font-size: 13px;
  text-transform: uppercase;
}

.login-input:focus {
  border-color: rgba(200,136,42,0.6);
  background: rgba(200,136,42,0.03);
}

.login-btn {
  width: 100%;
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--bg);
  background: linear-gradient(135deg, #C8882A 0%, #e8c060 50%, #C8882A 100%);
  background-size: 200% 200%;
  animation: shimmer 4s ease infinite;
  border: none;
  padding: 18px 28px;
  cursor: pointer;
  transition: opacity 0.2s;
}

.login-btn:hover { opacity: 0.88; }

.login-error {
  font-family: 'Jost', sans-serif;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #c84848;
  text-align: center;
  min-height: 18px;
  transition: opacity 0.2s;
}

.login-error:empty { opacity: 0; }

.login-note {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--dim);
  margin-top: 28px;
}

/* ─── PORTAL DASHBOARD ──────────────────────────────────────────────────────── */

#portal { display: none; min-height: 100vh; }

/* Header */
.portal-header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: rgba(14,18,16,0.96);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
  padding: 0 48px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.header-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  letter-spacing: 0.06em;
  color: var(--cream);
  text-decoration: none;
  flex-shrink: 0;
}

.header-logo em { font-style: italic; color: var(--gold); }

.header-client {
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
  flex: 1;
}

.header-client strong {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 15px;
  font-weight: 300;
  letter-spacing: 0.04em;
  text-transform: none;
  color: var(--cream);
  margin-top: 1px;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 20px;
  flex-shrink: 0;
}

.header-back {
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--dim);
  text-decoration: none;
  transition: color 0.2s;
}

.header-back:hover { color: var(--cream); }

.header-logout {
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--dim);
  background: none;
  border: 1px solid var(--border);
  padding: 7px 14px;
  cursor: pointer;
  transition: all 0.2s;
}

.header-logout:hover { color: var(--cream); border-color: var(--dim); }

/* Progress section */
.progress-section {
  background: var(--bg-warm);
  border-bottom: 1px solid var(--border);
  padding: 52px 48px 48px;
}

.progress-inner {
  max-width: 1100px;
  margin: 0 auto;
}

.progress-eyebrow {
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 9px;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.progress-eyebrow::before { content: ''; width: 18px; height: 1px; background: var(--gold); opacity: 0.5; }

.progress-headline {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(28px, 4vw, 44px);
  color: var(--cream);
  line-height: 1.1;
  margin-bottom: 28px;
}

.progress-headline em { font-style: italic; color: var(--gold-pale); }

.progress-bar-wrap {
  height: 3px;
  background: var(--border);
  position: relative;
  margin-bottom: 12px;
}

.progress-bar-fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  background: linear-gradient(to right, var(--gold), var(--gold-pale));
  transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
}

.progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.progress-count {
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
}

.progress-pct {
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--dim);
}

/* Filter tabs */
.filter-bar {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 48px;
  display: flex;
  align-items: stretch;
  gap: 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.filter-bar::-webkit-scrollbar { display: none; }

.filter-btn {
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--dim);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 18px 20px;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}

.filter-btn:hover { color: var(--silver); }

.filter-btn.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

.filter-count {
  font-size: 8px;
  background: var(--border);
  color: var(--muted);
  padding: 2px 6px;
  border-radius: 10px;
  transition: background 0.2s, color 0.2s;
}

.filter-btn.active .filter-count {
  background: rgba(200,136,42,0.15);
  color: var(--gold);
}

/* Asset grid */
.assets-section {
  padding: 48px;
  max-width: 1100px;
  margin: 0 auto;
}

.assets-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
}

.asset-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 28px 26px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: border-color 0.25s;
  position: relative;
}

.asset-card:hover { border-color: rgba(200,136,42,0.35); }

.asset-card.upcoming {
  opacity: 0.45;
  pointer-events: none;
}

.asset-card.progress { opacity: 0.75; }

.asset-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}

.asset-icon {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(200,136,42,0.08);
  border: 1px solid rgba(200,136,42,0.15);
  flex-shrink: 0;
}

.asset-icon svg {
  width: 16px;
  height: 16px;
  stroke: var(--gold);
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.asset-icon.teal { background: rgba(61,126,122,0.1); border-color: rgba(61,126,122,0.2); }
.asset-icon.teal svg { stroke: var(--teal-soft); }

.asset-type-badge {
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 8px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--dim);
  border: 1px solid var(--border);
  padding: 3px 8px;
  white-space: nowrap;
}

.asset-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 20px;
  color: var(--cream);
  line-height: 1.2;
}

.asset-sub {
  font-family: 'EB Garamond', serif;
  font-size: 15px;
  color: var(--dim);
  line-height: 1.45;
  flex: 1;
}

.asset-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 6px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.asset-status {
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
}

.status-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}

.status-delivered .status-dot { background: var(--gold); box-shadow: 0 0 6px rgba(200,136,42,0.5); }
.status-delivered { color: var(--gold); }

.status-progress .status-dot { background: var(--teal-soft); box-shadow: 0 0 6px rgba(61,126,122,0.4); animation: pulse 2s ease infinite; }
.status-progress { color: var(--teal-soft); }

.status-upcoming .status-dot { background: var(--border); }
.status-upcoming { color: var(--dim); }

.asset-cta {
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 8px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--bg);
  background: var(--gold);
  border: none;
  padding: 7px 14px;
  text-decoration: none;
  cursor: pointer;
  transition: background 0.2s, opacity 0.2s;
  display: inline-block;
}

.asset-cta:hover { background: var(--gold-pale); }

.asset-cta.disabled {
  background: var(--border);
  color: var(--dim);
  cursor: default;
  pointer-events: none;
}

/* Empty state */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 24px;
  color: var(--dim);
}

.empty-state p {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 22px;
}

/* Animations */
@keyframes shimmer {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}

/* Mobile — tablet */
@media (max-width: 900px) {
  .portal-header { padding: 0 20px; }
  .header-client { display: none; }
  .progress-section { padding: 36px 20px 32px; }
  .filter-bar { padding: 0 4px; }
  .filter-btn { padding: 0 14px; min-height: 52px; font-size: 8.5px; }
  .assets-section { padding: 24px 16px; }
  .assets-grid { grid-template-columns: repeat(2, 1fr); }
}

/* Mobile — phone */
@media (max-width: 600px) {
  .assets-grid { grid-template-columns: 1fr; }
  .asset-card { padding: 20px 18px; }
  .asset-footer { flex-wrap: wrap; gap: 10px; }
  .asset-cta { min-height: 40px; display: flex; align-items: center; padding: 10px 16px; font-size: 9px; }
  .progress-headline { font-size: clamp(22px, 6.5vw, 34px); }
  .assets-section { padding: 18px 12px; }
}

/* Mobile — small phone */
@media (max-width: 480px) {
  #login-screen { align-items: flex-start; padding: max(48px, 10vh) 20px 32px; }
  .login-label { margin-bottom: 28px; }
  .login-sub { font-size: 16px; margin-bottom: 32px; }
  .login-btn { min-height: 52px; }
  .header-back { display: none; }
  .header-logout { padding: 10px 12px; min-height: 44px; }
  .progress-section { padding: 24px 14px; }
  .progress-headline { font-size: clamp(20px, 6vw, 30px); }
  .filter-btn { padding: 0 10px; letter-spacing: 0.12em; }
  .assets-section { padding: 16px 10px; }
}
</style>
</head>
<body>

<!-- ─── LOGIN SCREEN ─────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-wordmark">QI <em>Studios</em></div>
    <div class="login-rule"></div>
    <span class="login-label">Client Portal</span>

    <h1 class="login-title">Your work<br>is <em>waiting.</em></h1>
    <p class="login-sub">Enter your project code to access your asset library.</p>

    <form class="login-form" onsubmit="handleLogin(event)">
      <div class="login-input-wrap">
        <input
          type="text"
          class="login-input"
          id="code-input"
          placeholder="Project Code"
          autocomplete="off"
          autocapitalize="characters"
          spellcheck="false"
          maxlength="20"
        >
      </div>
      <div class="login-error" id="login-error"></div>
      <button type="submit" class="login-btn">Enter Portal →</button>
    </form>

    <p class="login-note">Your code was included in your welcome email.<br>Questions? hello@quarantikiisland.com</p>
  </div>
</div>

<!-- ─── PORTAL DASHBOARD ─────────────────────────────────────────────────────── -->
<div id="portal">

  <!-- Header -->
  <header class="portal-header">
    <a href="./index.html" class="header-logo">QI <em>Studios</em></a>
    <div class="header-client">
      Client Portal
      <strong id="client-name-display"></strong>
    </div>
    <div class="header-actions">
      <a href="./index.html" class="header-back">← Studio</a>
      <button class="header-logout" onclick="handleLogout()">Log out</button>
    </div>
  </header>

  <!-- Progress -->
  <section class="progress-section">
    <div class="progress-inner">
      <p class="progress-eyebrow">Your Deliverables</p>
      <h2 class="progress-headline" id="progress-headline">
        <em id="delivered-count">0</em> of 100 assets delivered.
      </h2>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-bar" style="width: 0%"></div>
      </div>
      <div class="progress-meta">
        <span class="progress-count" id="progress-label">Loading…</span>
        <span class="progress-pct" id="progress-pct"></span>
      </div>
    </div>
  </section>

  <!-- Filter bar -->
  <nav class="filter-bar" id="filter-bar" aria-label="Filter assets">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">
      All <span class="filter-count" id="count-all">0</span>
    </button>
    <button class="filter-btn" data-filter="video" onclick="setFilter('video', this)">
      Videos <span class="filter-count" id="count-video">0</span>
    </button>
    <button class="filter-btn" data-filter="character" onclick="setFilter('character', this)">
      Character <span class="filter-count" id="count-character">0</span>
    </button>
    <button class="filter-btn" data-filter="script" onclick="setFilter('script', this)">
      Scripts <span class="filter-count" id="count-script">0</span>
    </button>
    <button class="filter-btn" data-filter="social" onclick="setFilter('social', this)">
      Social <span class="filter-count" id="count-social">0</span>
    </button>
    <button class="filter-btn" data-filter="brand" onclick="setFilter('brand', this)">
      Brand <span class="filter-count" id="count-brand">0</span>
    </button>
    <button class="filter-btn" data-filter="audio" onclick="setFilter('audio', this)">
      Audio <span class="filter-count" id="count-audio">0</span>
    </button>
  </nav>

  <!-- Asset grid -->
  <main class="assets-section">
    <div class="assets-grid" id="assets-grid"></div>
  </main>

</div>

const ICON_TEAL = ['script', 'social', 'audio'];

const STATUS_LABELS = {
  delivered: 'Delivered',
  progress:  'In Production',
  upcoming:  'Coming Soon',
};

const CTA_LABELS = {
  delivered: 'View →',
  progress:  'In Production',
  upcoming:  'Coming Soon',
};

// ─── STATE ──────────────────────────────────────────────────────────────────

let currentFilter = 'all';

// ─── LOGIN ──────────────────────────────────────────────────────────────────

function handleLogin(e) {
  e.preventDefault();
  const input = document.getElementById('code-input').value.trim().toUpperCase();
  const errEl = document.getElementById('login-error');

  if (input === CLIENT_CODE.toUpperCase()) {
    localStorage.setItem('qi_auth', '1');
    localStorage.setItem('qi_client', CLIENT_NAME);
    showPortal();
  } else {
    errEl.textContent = 'Incorrect code — check your welcome email.';
    document.getElementById('code-input').style.borderColor = 'rgba(200,72,72,0.5)';
    setTimeout(() => {
      errEl.textContent = '';
      document.getElementById('code-input').style.borderColor = '';
    }, 3000);
  }
}

function handleLogout() {
  localStorage.removeItem('qi_auth');
  localStorage.removeItem('qi_client');
  document.getElementById('portal').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('code-input').value = '';
}

// ─── PORTAL ─────────────────────────────────────────────────────────────────

function showPortal() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('portal').style.display = 'block';

  // Set client name
  document.getElementById('client-name-display').textContent = localStorage.getItem('qi_client') || CLIENT_NAME;

  // Count delivered
  const delivered = ASSETS.filter(a => a.status === 'delivered').length;
  document.getElementById('delivered-count').textContent = delivered;
  document.getElementById('progress-label').textContent = `${delivered} of 100 assets delivered`;
  document.getElementById('progress-pct').textContent = `${delivered}%`;

  // Animate progress bar
  setTimeout(() => {
    document.getElementById('progress-bar').style.width = delivered + '%';
  }, 200);

  // Update filter counts
  updateCounts();

  // Render all assets
  renderAssets('all');
}

function updateCounts() {
  const cats = ['video', 'character', 'script', 'social', 'brand', 'audio'];
  document.getElementById('count-all').textContent = ASSETS.length;
  cats.forEach(cat => {
    const el = document.getElementById('count-' + cat);
    if (el) el.textContent = ASSETS.filter(a => a.category === cat).length;
  });
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAssets(filter);
}

function renderAssets(filter) {
  const grid = document.getElementById('assets-grid');
  const filtered = filter === 'all' ? ASSETS : ASSETS.filter(a => a.category === filter);

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><p>No assets in this category yet — check back soon.</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(asset => {
    const isTeal = ICON_TEAL.includes(asset.category);
    const statusClass = 'status-' + asset.status;
    const cardClass = asset.status === 'upcoming' ? 'asset-card upcoming' : asset.status === 'progress' ? 'asset-card progress' : 'asset-card';
    const ctaDisabled = asset.status !== 'delivered' ? 'disabled' : '';
    const ctaHref = asset.link && asset.status === 'delivered' ? `href="${asset.link}" target="_blank"` : '';
    const ctaTag = asset.status === 'delivered' && asset.link ? 'a' : 'span';

    return `
      <div class="${cardClass}">
        <div class="asset-top">
          <div class="asset-icon ${isTeal ? 'teal' : ''}">
            ${ICONS[asset.category] || ''}
          </div>
          <span class="asset-type-badge">${asset.category}</span>
        </div>
        <div class="asset-title">${asset.title}</div>
        <div class="asset-sub">${asset.sub}</div>
        <div class="asset-footer">
          <span class="asset-status ${statusClass}">
            <span class="status-dot"></span>
            ${STATUS_LABELS[asset.status]}
          </span>
          <${ctaTag} ${ctaHref} class="asset-cta ${ctaDisabled}">${CTA_LABELS[asset.status]}</${ctaTag}>
        </div>
      </div>
    `;
  }).join('');
}

// ─── INIT ───────────────────────────────────────────────────────────────────

if (localStorage.getItem('qi_auth') === '1' && localStorage.getItem('qi_code') === 'ALTURA25') {
  showPortal();
} else {
  // Not authenticated for this portal — send back to login
  window.location.href = './portal.html';
